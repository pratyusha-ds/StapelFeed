name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, dev]

permissions:
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract pull request diff
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          git diff "$BASE"..."$HEAD" -- . > raw_diff.txt

      - name: Review code with Gemini
        id: gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          jq -n \
            --rawfile diff raw_diff.txt \
            --arg instructions "You are an encouraging but sharp peer developer reviewing a Turborepo monorepo. Skip excessive praise. Pinpoint obvious logic bugs, unhandled async errors, leftover debugging code (e.g. console.log), or strict TypeScript rule breakages." \
            '{ contents: [{ parts: [{ text: ($instructions + "\n\n```diff\n" + $diff + "\n```") }] }] }' > payload.json

          RESPONSE=$(curl -s -X POST \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=$GEMINI_API_KEY" \
            -H "Content-Type: application/json" \
            -d @payload.json)

          echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text' > review_output.txt 2>/dev/null || true

          if [ ! -s review_output.txt ] || [ "$(cat review_output.txt)" = "null" ]; then
            echo "Gemini API Error! Raw API Response was:"
            echo "$RESPONSE"
            echo "Could not generate review. Please check the API key permissions or payload structures." > review_output.txt
          fi

          echo "review<<EOF" >> "$GITHUB_OUTPUT"
          cat review_output.txt >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Post review comment on PR
        uses: actions/github-script@v7
        env:
          REVIEW: ${{ steps.gemini.outputs.review }}
        with:
          script: |
            const review = `## 🤖 AI Code Review\n\n${process.env.REVIEW}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: review
            });
