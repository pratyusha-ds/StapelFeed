services:
  postgres:
    image: postgres:18-alpine
    container_name: stapelfeed_db_srv
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - stapelfeed_pgdata_prod:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  stapelfeed_pgdata_prod:
